
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velver Motos | Catálogo Inteligente</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
    }

    .moto-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(59,160,255,0.2);
      border-radius: 16px;
      overflow: hidden;
      transition: 0.3s ease;
      backdrop-filter: blur(12px);
    }

    .moto-card:hover {
      transform: translateY(-8px);
      border-color: #3BA0FF;
      box-shadow: 0 0 25px rgba(59,160,255,0.25);
    }

    .moto-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <section class="max-w-7xl mx-auto px-4 py-12">
    
    <h1 class="text-4xl font-bold text-center mb-10">
      Catálogo Inteligente Velver Motos
    </h1>
<div class="mb-10">
  <input 
    type="text" 
    id="buscador"
    placeholder="Buscar moto por modelo, marca o categoría..."
    class="w-full p-4 rounded-xl bg-black border border-blue-500 text-white focus:outline-none focus:border-cyan-400"
  >
</div>
    <div id="motos-container" class="grid md:grid-cols-3 gap-8"></div>

  </section>

  <script src="motos.js"></script>
  <script src="catalogo.js"></script>

</body>
</html>
