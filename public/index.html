<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Velver Motos Atlixco™ | BLACK CODE™ Digital Ecosystem</title>
    <meta name="description" content="Experiencia premium inteligente de motocicletas en Atlixco. Ecosistema cinematográfico BLACK CODE™.">
    <meta name="theme-color" content="#050505">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        :root{ --blue-primary:#0057FF; --blue-cyan:#3BA0FF; --transition:.45s cubic-bezier(.22,.61,.36,1); }
        body{ font-family:'Inter',sans-serif; background:#050505; color:#F5F7FA; overflow-x:hidden; min-height:100svh; }
        /* Backgrounds */
        .ambient-glow{ position:fixed; inset:0; background:radial-gradient(circle at top center, rgba(0,87,255,.16), transparent 55%); pointer-events:none; z-index:0; }
        .grid-overlay{ position:fixed; inset:0; background-image:linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px); background-size:40px 40px; opacity:.14; pointer-events:none; z-index:0; }
        
        /* Layout */
        .topbar{ position:fixed; top:0; width:100%; padding:20px 7vw; display:flex; align-items:center; justify-content:space-between; z-index:1000; backdrop-filter:blur(24px); background:rgba(5,5,5,.45); border-bottom:1px solid rgba(255,255,255,.05); }
        .main-logo{ height:50px; object-fit:contain; }
        .hero{ position:relative; min-height:100svh; display:flex; align-items:center; padding:150px 8vw 120px; }
        .hero-bg{ position:absolute; inset:0; z-index:-2; }
        .hero-bg img{ width:100%; height:100%; object-fit:cover; opacity:.28; }
        section{ padding:100px 8vw; }
        .intro-image{ width:100%; height:100%; object-fit:cover; border-radius:36px; }
        .bike-card{ background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:30px; padding:20px; }
        .bike-image img{ width:100%; height:200px; object-fit:cover; border-radius:20px; }
        .primary-btn{ padding:18px 34px; border-radius:20px; background:linear-gradient(135deg, var(--blue-primary), var(--blue-cyan)); color:white; border:none; cursor:pointer; font-weight:600; }
        .blackcode{ position:fixed; bottom:20px; right:20px; font-size:10px; opacity:.04; transform:rotate(-11deg); pointer-events:none; }
    </style>
</head>
<body>

<div class="ambient-glow"></div>
<div class="grid-overlay"></div>
<div class="blackcode">BLACK CODE by KNJO™</div>

<header class="topbar">
    <img src="logo-main.png" alt="Velver Motos" class="main-logo">
    <button class="primary-btn" onclick="window.open('https://wa.me/522441234567')">WhatsApp</button>
</header>

<section class="hero">
    <div class="hero-bg"><img src="hero-background.webp" alt="Background"></div>
    <div class="hero-content">
        <h1 style="font-size:clamp(3rem, 8vw, 6rem); line-height:1;">NEXT GENERATION<br><span style="color:var(--blue-cyan)">MOTORCYCLE</span></h1>
        <p style="color:#8B949E; margin:20px 0;">Velver Motos Atlixco™ | Ecosistema Cinematográfico</p>
    </div>
</section>

<section class="intro">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:50px; align-items:center;">
        <div>
            <h2>Más Que Motocicletas.</h2>
            <p style="margin-top:20px; color:#8B949E;">Nuestra experiencia premium en Atlixco redefine el mercado.</p>
        </div>
        <img src="intro.webp" alt="Sucursal" class="intro-image">
    </div>
</section>

<section>
    <h2>Catálogo Inteligente</h2>
    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:30px; margin-top:40px;">
        <article class="bike-card">
            <div class="bike-image"><img src="crx200.webp" alt="CRX 200"></div>
            <h3 style="margin:20px 0;">CRX 200</h3>
            <button class="primary-btn">Ver Más</button>
        </article>
        <article class="bike-card">
            <div class="bike-image"><img src="fighter200.webp" alt="Fighter 200"></div>
            <h3 style="margin:20px 0;">Fighter 200</h3>
            <button class="primary-btn">Ver Más</button>
        </article>
    </div>
</section>

<script>
    gsap.registerPlugin(ScrollTrigger);
    gsap.from(".hero-content", {opacity:0, y:50, duration:1.5});
    gsap.from(".bike-card", {opacity:0, y:50, stagger:0.2, scrollTrigger:".catalog-grid"});
</script>

</body>
</html>
