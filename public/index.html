  <style>
    * {

    }

    .glass {
      background: rgba(255, 255, 255, .035);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .glass-soft {
      background: rgba(255, 255, 255, .02);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, .04);
    }

    .gradient-text {
      background: linear-gradient(90deg, #FFFFFF, #9FD3FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtle {
      color: #8B949E;
    }

    .primary-btn {
      background: linear-gradient(135deg, #0057FF, #3BA0FF);
      transition: .4s ease;
      box-shadow: 0 20px 70px rgba(0, 87, 255, .22);
    }

    .primary-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 90px rgba(0, 87, 255, .35);
    }

    .bg-system {
      position: fixed;
      inset: 0;
      z-index: -3;
      overflow: hidden;
    }

    .glow-a {
      position: absolute;
      width: 900px;
      height: 900px;
      border-radius: 999px;
      background: #0057FF;
      top: -300px;
      left: -300px;
      opacity: .08;
      filter: blur(180px);
      animation: floatGlow 12s infinite alternate ease-in-out;
    }

    .glow-b {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 999px;
      background: #3BA0FF;
      bottom: -250px;
      right: -220px;
      opacity: .08;
      filter: blur(180px);
      animation: floatGlow 14s infinite alternate ease-in-out;
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: .02;
      background-image: radial-gradient(#fff .5px, transparent .5px);
      background-size: 12px 12px;
    }

    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, .35);
      border-radius: 50%;
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      from {
        transform: translateY(100vh);
      }

      to {
        transform: translateY(-120vh);
      }
    }

    @keyframes floatGlow {
      from {
        transform: translateY(0px) translateX(0px);
      }

      to {
        transform: translateY(40px) translateX(20px);
      }
    }

    .navbar {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 24px);
      max-width: 1450px;
      z-index: 1000;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 0 24px;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .18;
      z-index: -2;
      filter: saturate(120%);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, .45), rgba(5, 5, 5, .9));

    .massive {

    }

    .catalog-card {

      overflow: hidden;
      transform-style: preserve-3d;

    .catalog-card:hover {

    .social-btn {

    .blur-circle {

  <script>

    // INTRO

    window.addEventListener('load', () => {

      gsap.to('#introLogo', {
        opacity: 1,
        scale: 1,
        duration: 1.2
      });

      gsap.to('#introTitle', {
        opacity: 1,
        y: -10,
        duration: 1,
        delay: .3
      });

      gsap.to('#introSub', {
        opacity: 1,
        y: -10,
        duration: 1,
        delay: .6
      });

      gsap.to('#intro', {
        opacity: 0,
        duration: 1.4,
        delay: 2.8,
        pointerEvents: 'none'
      });

    });

    // PARTICLES

    const particles = document.getElementById('particles');

    for (let i = 0; i < 70; i++) {

      const particle = document.createElement('div');

      particle.classList.add('particle');

      particle.style.left = Math.random() * 100 + 'vw';

      particle.style.animationDuration = (Math.random() * 12 + 8) + 's';

      particle.style.opacity = Math.random();

      particle.style.transform = `scale(${Math.random() * 2})`;

      particles.appendChild(particle);

    }

    // PARALLAX

    document.addEventListener('mousemove', (e) => {

      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;

      document.querySelectorAll('.parallax').forEach(el => {

        const speed = el.dataset.speed;

        const moveX = (x - .5) * 50 * speed;
        const moveY = (y - .5) * 50 * speed;

        el.style.transform =
          `translate(${moveX}px, ${moveY}px)`;

      });

    });

  </script>
