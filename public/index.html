<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Velver Motos Atlixco™ | BLACK CODE™ Digital Ecosystem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        :root{ --blue-primary:#0057FF; --blue-cyan:#3BA0FF; }
        body{ font-family:'Inter',sans-serif; background:#050505; color:#F5F7FA; min-height:100svh; overflow-x:hidden; }
        .topbar{ position:fixed; top:0; width:100%; padding:20px 7vw; display:flex; align-items:center; justify-content:space-between; z-index:1000; backdrop-filter:blur(24px); background:rgba(5,5,5,.45); border-bottom:1px solid rgba(255,255,255,.05); }
        .hero{ position:relative; min-height:100svh; display:flex; align-items:center; padding:150px 8vw 120px; }
        .hero-bg{ position:absolute; inset:0; z-index:-2; }
        .hero-bg img{ width:100%; height:100%; object-fit:cover; opacity:.28; }
        .primary-btn{ padding:18px 34px; border-radius:20px; background:linear-gradient(135deg, var(--blue-primary), var(--blue-cyan)); color:white; border:none; cursor:pointer; font-weight:600; }
        .social-icons{ display:flex; gap:25px; justify-content:center; margin-top:25px; }
        .social-icons a{ color:#8B949E; font-size:28px; transition:0.3s; }
        .social-icons a:hover{ color:var(--blue-cyan); transform:translateY(-5px); }
    </style>
</head>
<body>

<header class="topbar">
    <img src="logo-main.png" alt="Velver Motos" style="height:50px;">
    <button class="primary-btn" onclick="window.open('https://wa.me/522441252948')">WhatsApp</button>
</header>

<section class="hero">
    <div class="hero-bg"><img src="hero-background.webp" alt="Background"></div>
    <div class="hero-content">
        <h1 style="font-size:clamp(3rem, 8vw, 6rem); line-height:1;">NEXT GENERATION<br><span style="color:var(--blue-cyan)">MOTORCYCLE</span></h1>
        <p style="color:#8B949E; margin:20px 0;">Velver Motos Atlixco™ | Ecosistema Cinematográfico</p>
    </div>
</section>

<footer style="padding:80px 8vw; text-align:center; border-top:1px solid rgba(255,255,255,.05);">
    <p>Velver Motos Atlixco™ — BLACK CODE™ Digital Ecosystem</p>
    <div class="social-icons">
        <a href="https://www.tiktok.com/@velvermotosatlixc0" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.facebook.com/share/1GsfHLH1q2/" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/velver_motos" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://maps.app.goo.gl/qTegJLWbNGXa4p117?g_st=ac" target="_blank"><i class="fas fa-map-marker-alt"></i></a>
    </div>
</footer>

<script>
    gsap.registerPlugin(ScrollTrigger);
    gsap.from(".hero-content", {opacity:0, y:50, duration:1.5});
</script>

</body>
</html>
