<style>

/* ===================================================== */
/* ROOT */
/* ===================================================== */

:root{

    --blue:#1E6DFF;
    --blue-dark:#0B46B5;
    --navy:#081B44;
    --black:#050505;
    --white:#F5F7FA;
    --silver:#D7DCE3;
    --gray:#8D96A6;

}

/* ===================================================== */
/* GLOBAL */
/* ===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    background:#050505;
    color:white;

    font-family:'Inter',sans-serif;

    overflow-x:hidden;

}

/* ===================================================== */
/* CINEMATIC BACKGROUND */
/* ===================================================== */

.hero-bg{

    position:fixed;
    inset:0;

    z-index:-10;

    overflow:hidden;

}

.hero-bg img{

    width:100%;
    height:100%;

    object-fit:cover;

    transform:scale(1.08);

    filter:
    brightness(.35)
    contrast(1.1)
    saturate(1.1);

}

/* OVERLAY */

.hero-overlay{

    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at top right,
    rgba(30,109,255,.25),
    transparent 35%),

    radial-gradient(circle at bottom left,
    rgba(11,70,181,.22),
    transparent 30%),

    linear-gradient(to bottom,
    rgba(0,0,0,.45),
    rgba(0,0,0,.92));

}

/* PARTICLES */

.particles{

    position:absolute;
    inset:0;

    background-image:
    radial-gradient(rgba(255,255,255,.12) 1px, transparent 1px);

    background-size:4px 4px;

    opacity:.03;

    animation:particlesMove 25s linear infinite;

}

@keyframes particlesMove{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(-120px);
    }

}

/* ===================================================== */
/* NAVBAR */
/* ===================================================== */

header{

    position:fixed;
    width:100%;

    top:0;

    z-index:999;

    backdrop-filter:blur(18px);

    background:rgba(0,0,0,.28);

    border-bottom:1px solid rgba(255,255,255,.05);

}

.navbar{

    max-width:1450px;

    margin:auto;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 40px;

}

.logo{

    display:flex;
    align-items:center;
    gap:16px;

}

.logo img{

    width:58px;
    height:58px;

    border-radius:50%;

    box-shadow:
    0 0 25px rgba(30,109,255,.45);

}

.logo h1{

    font-family:'Orbitron',sans-serif;

    letter-spacing:3px;

    font-size:1.1rem;

}

nav{

    display:flex;
    gap:35px;

}

nav a{

    text-decoration:none;
    color:#d6dde6;

    transition:.3s ease;

    position:relative;

}

nav a:hover{

    color:var(--blue);

}

    border:none;

    border-radius:999px;

    background:

    var(--blue));

    font-weight:600;

    cursor:pointer;

    transition:.4s ease;

    box-shadow:
    0 0 25px rgba(30,109,255,.35);

}

.btn-main:hover{

    transform:translateY(-3px);

    box-shadow:
    0 0 45px rgba(30,109,255,.55);

}

/* ===================================================== */
/* HERO */
/* ===================================================== */

.hero{

}

.hero-container{

    max-width:1450px;

    margin:auto;

    display:grid;
    grid-template-columns:1.2fr .8fr;

    gap:60px;

    align-items:center;

}

/* TEXT */

.hero-text small{

    color:var(--blue);

    letter-spacing:5px;

    font-weight:700;

}

.hero-text h2{

    margin-top:25px;

    line-height:.95;

    font-family:'Orbitron',sans-serif;

    text-transform:uppercase;

    text-shadow:

.hero-text p{

    font-size:1.05rem;

}

.hero-buttons{

    margin-top:40px;

    flex-wrap:wrap;

}

.btn-glass{

    border-radius:999px;

    background:rgba(255,255,255,.05);

    color:white;

    backdrop-filter:blur(12px);

    cursor:pointer;

    transition:.3s ease;

}

.btn-glass:hover{

    background:rgba(255,255,255,.1);

}

/* ===================================================== */
/* EXPERIENCE PANEL */
/* ===================================================== */

}

    align-items:center;

}

.live{

    font-size:.9rem;

}

    animation:pulse 1.5s infinite;

}

@keyframes pulse{

        opacity:.5;
    }

    100%{

        opacity:1;
    }

}

    font-size:2rem;

    font-family:'Orbitron',sans-serif;

}

    color:#d3dae2;

}

.panel-grid{

    margin-top:35px;

    display:grid;
    grid-template-columns:1fr 1fr;

    gap:18px;

}

.info-card{

    padding:22px;

    border-radius:22px;

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.05);

    transition:.4s ease;

}

.info-card:hover{

    transform:translateY(-5px);

    box-shadow:
    0 0 25px rgba(30,109,255,.18);

}

.info-card h4{

    color:var(--blue);

    font-size:1.4rem;

    font-family:'Orbitron',sans-serif;

}

.info-card p{

    margin-top:12px;

    font-size:.95rem;

}

/* ===================================================== */
/* SHOWROOM SECTION */
/* ===================================================== */

.showroom{

    padding:120px 40px;

}

.showroom-container{

    max-width:1450px;

    border-radius:35px;

.showroom-image img{

    object-fit:cover;

    transition:1s ease;

}

.showroom-image:hover img{

    transform:scale(1.05);

}

.showroom-glow{

    position:absolute;
    inset:0;

    background:

/* TEXT */

.showroom-text small{

    color:var(--blue);

    letter-spacing:5px;

    font-weight:700;

}

.showroom-text h3{

    margin-top:20px;

    font-size:clamp(2rem,5vw,4rem);

    font-family:'Orbitron',sans-serif;

    line-height:1.1;

}

.showroom-text p{

    margin-top:25px;

    line-height:2;

    color:#d2dae4;

}

.features{

    margin-top:35px;

    display:flex;
    flex-direction:column;
    gap:18px;

}
