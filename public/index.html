        <!-- ============================================ -->

        <div class="hero-content reveal">

            </small>

            <h1>

                Una experiencia construida
                desde la confianza.

            </h1>

            <p>

                Creemos que elegir una motocicleta debe sentirse claro,

                src="SHOWROOM-EXTERIOR.png"
                alt="Velver Motos Showroom">

            </div>

        </div>

</section>

<!-- ===================================================== -->
<!-- CSS -->
<!-- ===================================================== -->

<style>

/* ===================================================== */
/* HERO */
/* ===================================================== */

.hero{

    position:relative;

    min-height:100vh;

    display:flex;

    align-items:center;

    overflow:hidden;

    padding:140px 40px 100px;

    background:#050505;

}

/* ===================================================== */
/* OVERLAY */
/* ===================================================== */

.hero-overlay{

    position:absolute;

    inset:0;

    background:

    radial-gradient(circle at right,
    rgba(30,109,255,.08),
    transparent 30%),

    linear-gradient(to right,
    rgba(0,0,0,.92) 10%,
    rgba(0,0,0,.55) 45%,
    rgba(0,0,0,.2) 100%);

    z-index:1;

}

/* ===================================================== */
/* CONTAINER */
/* ===================================================== */

.hero-container{

    position:relative;

    z-index:2;

    width:100%;

    max-width:1450px;

    margin:auto;

    display:grid;

    grid-template-columns:1fr 1.1fr;

    gap:60px;

    align-items:center;

}

/* ===================================================== */
/* LEFT CONTENT */
/* ===================================================== */

.hero-content{

    max-width:620px;

}

/* ===================================================== */
/* SMALL */
/* ===================================================== */

.hero-content small{

    display:inline-block;

    color:#1E6DFF;

    letter-spacing:5px;

    font-weight:700;

    margin-bottom:28px;

    font-size:.82rem;

}

/* ===================================================== */
/* TITLE */
/* ===================================================== */

.hero-content h1{

    font-size:clamp(3.5rem,7vw,6.8rem);

    line-height:.95;

    letter-spacing:-3px;

    font-weight:700;

    color:#F5F7FA;

    max-width:700px;

}

/* ===================================================== */
/* TEXT */
/* ===================================================== */

.hero-content p{

    margin-top:38px;

    color:#D7DCE3;

    line-height:2;

    font-size:1.05rem;

    max-width:560px;

}

/* ===================================================== */
/* ACTIONS */
/* ===================================================== */

.hero-actions{

    margin-top:50px;

    display:flex;

    flex-wrap:wrap;

    gap:18px;

}

/* ===================================================== */
/* PRIMARY BUTTON */
/* ===================================================== */

.btn-primary{

    padding:16px 30px;

    border:none;

    border-radius:999px;

    background:
    linear-gradient(135deg,
    #0B46B5,
    #1E6DFF);

    color:white;

    font-weight:600;

    cursor:pointer;

    transition:.35s ease;

}

.btn-primary:hover{

    transform:translateY(-4px);

}

/* ===================================================== */
/* SECONDARY BUTTON */
/* ===================================================== */

.btn-secondary{

    padding:16px 30px;

    border-radius:999px;

    border:1px solid rgba(255,255,255,.08);

    background:rgba(255,255,255,.03);

    color:white;

    cursor:pointer;

    transition:.35s ease;

}

.btn-secondary:hover{

    background:rgba(255,255,255,.08);

}

/* ===================================================== */
/* HERO VISUAL */
/* ===================================================== */

.hero-visual{

    position:relative;

    display:flex;

    justify-content:flex-end;

}

/* ===================================================== */
/* IMAGE WRAPPER */
/* ===================================================== */

.hero-image-wrapper{

    position:relative;

    width:100%;

    max-width:780px;

    border-radius:34px;

    overflow:hidden;

    box-shadow:
    0 0 100px rgba(0,0,0,.65);

}

/* ===================================================== */
/* IMAGE */
/* ===================================================== */

.hero-image-wrapper img{

    width:100%;

    height:100%;

    object-fit:cover;

    display:block;

    transition:1.5s ease;

    filter:
    brightness(.92)
    contrast(1.02);

}

.hero-image-wrapper:hover img{

    transform:scale(1.03);

}

/* ===================================================== */
/* IMAGE OVERLAY */
/* ===================================================== */

.hero-image-wrapper::after{

    content:"";

    position:absolute;

    inset:0;

    background:

    linear-gradient(to top,
    rgba(0,0,0,.45),
    transparent 40%);

}

/* ===================================================== */
/* SCROLL INDICATOR */
/* ===================================================== */

.scroll-indicator{

    position:absolute;

    bottom:40px;

    left:50%;

    transform:translateX(-50%);

    z-index:3;

}

.scroll-indicator span{

    display:block;

    width:2px;

    height:70px;

    background:
    linear-gradient(to bottom,
    rgba(255,255,255,.0),
    rgba(255,255,255,.7),
    rgba(255,255,255,.0));

    animation:scrollMove 2s infinite;

}

@keyframes scrollMove{

    0%{

        opacity:.25;
        transform:translateY(0);

    }

    50%{

        opacity:1;
        transform:translateY(10px);

    }

    100%{

        opacity:.25;
        transform:translateY(0);

    }

}

/* ===================================================== */
/* REVEAL */
/* ===================================================== */

.reveal{

    opacity:0;

    transform:translateY(40px);

    animation:fadeReveal 1.2s ease forwards;

}

@keyframes fadeReveal{

    to{

        opacity:1;
        transform:translateY(0);

    }

}

/* ===================================================== */
/* RESPONSIVE */
/* ===================================================== */

@media(max-width:1100px){

    .hero-container{

        grid-template-columns:1fr;

        gap:70px;

    }

    .hero-content{

        max-width:100%;

        text-align:center;

        margin:auto;

    }

    .hero-content p{

        margin-left:auto;
        margin-right:auto;

    }

    .hero-actions{

        justify-content:center;

    }

    .hero-visual{

        justify-content:center;

    }

}

@media(max-width:768px){

    .hero{

        padding-top:180px;

    }

    .hero-content h1{

        letter-spacing:-1px;

    }

}

</style>
