<style>

*{

padding:0;

}

:root{

--bg2:#0B0D12;

--blue:#0057FF;
--cyan:#3BA0FF;

--white:#F5F7FA;
--gray:#8B949E;

--transition:
.45s cubic-bezier(.22,.61,.36,1);

}

html{
scroll-behavior:smooth;
overflow-x:hidden;
}

body{

font-family:'Inter',sans-serif;

background:#050505;

color:#F5F7FA;

overflow-x:hidden;

position:relative;

text-rendering:optimizeLegibility;

-webkit-font-smoothing:antialiased;

}

::-webkit-scrollbar{
width:10px;
}

::-webkit-scrollbar-track{

}

::-webkit-scrollbar-thumb{
background:rgba(255,255,255,.14);

}

.low-performance .hero-video,
.low-performance #intro-video,
.low-performance .hero-fog,
.low-performance .ambient-light{
display:none;
}

.low-performance .hero{
background:
linear-gradient(
180deg,
#050505,
#0B0D12
);
}

body::before{

content:"";

position:fixed;

inset:0;

background:
radial-gradient(
circle at top,
rgba(0,87,255,.15),
transparent 60%
);

pointer-events:none;

z-index:0;
}

.vignette{

position:fixed;

inset:0;

background:
radial-gradient(
circle,
transparent 45%,
rgba(0,0,0,.82)
);

pointer-events:none;

z-index:1;
}

.ambient-light{

position:fixed;

width:900px;
height:900px;

top:-300px;
right:-200px;

background:
radial-gradient(
circle,
rgba(0,87,255,.16),
transparent 70%
);

filter:blur(120px);

animation:
ambientFloat 14s ease infinite;

pointer-events:none;

z-index:1;
}

@keyframes ambientFloat{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(40px);
}

100%{
transform:translateY(0px);
}

}

#app{
position:relative;
z-index:2;
}

#intro-screen{

position:fixed;

inset:0;

z-index:999999;

display:flex;

align-items:center;

justify-content:center;

overflow:hidden;

background:
#000 url('intro-poster.webp')
center center/cover no-repeat;

transition:
opacity 1s ease,
visibility 1s ease;
}

#intro-video{

position:absolute;

inset:0;

width:100%;
height:100%;

object-fit:cover;

filter:
brightness(.3)
contrast(1.1);

}

.intro-overlay{

position:absolute;

inset:0;

background:
linear-gradient(
to bottom,
rgba(0,0,0,.2),
rgba(0,0,0,.92)
);

}

.intro-content{

z-index:5;

align-items:center;

gap:24px;

animation:
introReveal 2s ease;
}

@keyframes introReveal{

0%{
opacity:0;
transform:translateY(30px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

.intro-logo{

width:min(380px,80vw);

filter:
drop-shadow(0 0 60px rgba(0,87,255,.3));

}

left:0;

padding:20px 7vw;

display:flex;

align-items:center;

z-index:1000;

rgba(5,5,5,.42);

blur(24px);

border-bottom:
1px solid rgba(255,255,255,.05);

transition:var(--transition);
}

.topbar.scrolled{

padding:16px 7vw;

background:
rgba(5,5,5,.78);

0 10px 40px rgba(0,0,0,.4);
}

.btn-primary,
.btn-secondary{

align-items:center;

}

border:none;

border-radius:18px;

linear-gradient(

0 0 60px rgba(0,87,255,.25);
}

.btn-primary:hover{

translateY(-4px);

}

.btn-secondary{

background:
rgba(255,255,255,.04);

1px solid rgba(255,255,255,.08);

}

display:flex;

align-items:center;

170px 8vw 120px;

linear-gradient(

rgba(5,5,5,.12),

radial-gradient(

.hero-bike{

<script>

window.addEventListener('DOMContentLoaded', () => {

const introScreen =
document.getElementById('intro-screen');

function closeIntro(){

if(!introScreen) return;

introScreen.style.opacity='0';

introScreen.style.visibility='hidden';

introScreen.style.pointerEvents='none';

}

setTimeout(closeIntro,4500);

const navbar =
document.getElementById('navbar');

window.addEventListener(
'scroll',
()=>{

if(window.scrollY > 60){

navbar.classList.add('scrolled');

}else{

navbar.classList.remove('scrolled');

}

},
{ passive:true }
);

if(typeof gsap === 'undefined') return;

gsap.registerPlugin(ScrollTrigger);

const reducedMotion =
window.matchMedia(
'(prefers-reduced-motion: reduce)'
).matches;

if(!reducedMotion){

gsap.from('.hero-title',{

opacity:0,
y:80,
duration:1.2

});

gsap.from('.hero-description',{

opacity:0,
y:40,
duration:1,
delay:.3

});

gsap.from('.hero-actions',{

opacity:0,
y:40,
duration:1,
delay:.5

});

}

});

</script>
