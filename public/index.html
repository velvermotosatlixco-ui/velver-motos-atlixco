<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1,viewport-fit=cover"
/>

<title>Velver Motos Atlixco™ | AI Smart Catalog</title>

<meta
name="description"
content="Experiencia premium inteligente de motocicletas en Atlixco."
>

<meta name="theme-color" content="#050505">
<meta name="robots" content="index,follow">

<meta property="og:title" content="Velver Motos Atlixco™">
<meta property="og:description" content="AI Smart Catalog™">
<meta property="og:image" content="/og-cover.webp">

<link rel="canonical" href="https://velvermotos.com">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet"
/>

<link rel="preload" as="image" href="/logo-secondary.webp">

<link rel="icon" href="/logo-main.png">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-G1JRYB0WW5"></script>

<script>

window.dataLayer=window.dataLayer||[];

function gtag(){
dataLayer.push(arguments);
}

gtag('js',new Date());

gtag('config','G-G1JRYB0WW5');

</script>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#050505;
color:#F5F7FA;
overflow-x:hidden;
}

.container-system{
max-width:1450px;
margin:auto;
}

.section{
padding:140px 24px;
}

.glass{
background:rgba(255,255,255,.03);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.05);
}

.primary-btn{
background:linear-gradient(135deg,#0057FF,#3BA0FF);
}

.subtle{
color:#8B949E;
}

.gradient-text{
background:linear-gradient(90deg,#FFF,#9FD3FF);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.massive{
font-size:clamp(3rem,10vw,8rem);
font-weight:900;
line-height:.95;
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
padding:24px;
}

.catalog-card{
transition:.4s;
cursor:pointer;
}

.catalog-card:hover{
transform:translateY(-10px);
}

.search-input::placeholder{
color:#8B949E;
}

.knjo{
position:fixed;
right:12px;
bottom:10px;
font-size:8px;
opacity:.02;
transform:rotate(11deg);
pointer-events:none;
letter-spacing:2px;
}

.skeleton{
height:420px;
border-radius:28px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{opacity:.3;}

50%{opacity:.1;}

100%{opacity:.3;}

}

</style>

</head>

<body>

<div class="knjo">
BLACK CODE by KNJO • KNJO-BLK-1141015
</div>


<section class="hero">

<div class="container-system">

<h1 class="massive">

El futuro de las

<span class="gradient-text">
motocicletas premium.
</span>

</h1>

<p class="mt-8 text-xl subtle max-w-xl">
Ecosistema cinematográfico diseñado para nueva generación.
</p>

</div>

</section>


<section class="section" id="catalogo">

<div class="container-system">


<div class="grid md:grid-cols-3 gap-5 mb-12">


<input
id="searchInput"
placeholder="Buscar moto..."
class="search-input glass px-5 py-4 rounded-2xl bg-transparent outline-none"
/>


<select
id="brandFilter"
class="glass px-5 py-4 rounded-2xl bg-transparent"
>

<option value="all">Todas las marcas</option>

</select>


<select
id="typeFilter"
class="glass px-5 py-4 rounded-2xl bg-transparent"
>

<option value="all">Todas las categorías</option>

</select>

</div>


<div
id="catalog-grid"
class="grid md:grid-cols-2 xl:grid-cols-3 gap-8"
></div>


</div>

</section>


<script>

let motos=[];

const grid=document.getElementById("catalog-grid");

const searchInput=document.getElementById("searchInput");

const brandFilter=document.getElementById("brandFilter");

const typeFilter=document.getElementById("typeFilter");


function skeleton(){

grid.innerHTML="";

for(let i=0;i<6;i++){

grid.innerHTML+=`
<div class="glass skeleton"></div>
`;

}

}


function trackMoto(name){

gtag('event','moto_click',{

event_category:'catalog',

event_label:name

});

}


function render(data){

grid.innerHTML="";


data.forEach(moto=>{

grid.innerHTML+=`

<div
onclick="trackMoto('${moto.nombre}')"
class="catalog-card glass rounded-[28px] p-5"
>

<img
src="${moto.imagen}"
loading="lazy"
class="rounded-2xl mb-5 w-full"
>

<p class="text-sm subtle mb-2">
${moto.marca}
</p>

<h3 class="text-2xl font-black mb-3">
${moto.nombre}
</h3>

<p class="text-blue-400 font-bold">
${moto.precio}
</p>

</div>

`;

});

}


function filterCatalog(){

let filtered=[...motos];


const search=searchInput.value.toLowerCase();

const brand=brandFilter.value;

const type=typeFilter.value;


if(search){

filtered=filtered.filter(m=>

m.nombre.toLowerCase().includes(search)

);

}


if(brand!=="all"){

filtered=filtered.filter(m=>m.marca===brand);

}


if(type!=="all"){

filtered=filtered.filter(m=>m.categoria===type);

}


render(filtered);

}


async function init(){

skeleton();


const res=await fetch('/catalogo/data/motos.json');

motos=await res.json();


const brands=[...new Set(motos.map(m=>m.marca))];

const types=[...new Set(motos.map(m=>m.categoria))];


brands.forEach(b=>{

brandFilter.innerHTML+=`

<option value="${b}">
${b}
</option>

`;

});


types.forEach(t=>{

typeFilter.innerHTML+=`

<option value="${t}">
${t}
</option>

`;

});


render(motos);

}


searchInput.addEventListener("input",filterCatalog);

brandFilter.addEventListener("change",filterCatalog);

typeFilter.addEventListener("change",filterCatalog);


document.addEventListener('DOMContentLoaded',()=>{

init();

});


</script>

</body>
</html>
