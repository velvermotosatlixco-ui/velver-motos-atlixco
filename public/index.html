<style>

:root{

--s1:11px;
--s2:14px;
--s3:10px;
--s4:15px;

}

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;

}

html{

scroll-snap-type:y mandatory;

}

body{

background:black;
color:white;
overflow-x:hidden;

}

.section{

height:100vh;

scroll-snap-align:start;

display:flex;
justify-content:center;
align-items:center;

position:relative;

background-size:cover;
background-position:center;

overflow:hidden;

}

.section::before{

content:"";

position:absolute;
inset:0;

background:
radial-gradient(
circle at center,
transparent 0%,
rgba(0,0,0,.35) 45%,
rgba(0,0,0,.88) 100%
);

z-index:1;

}

.section::after{

content:"";

position:absolute;
inset:0;

background:
linear-gradient(
rgba(255,255,255,.02),
rgba(0,0,0,.1)
);

animation:fog 12s linear infinite;

z-index:1;

}

.content{

position:relative;

z-index:3;

text-align:center;

animation:cinematicReveal 1.4s ease;

padding:20px;

}

.logo{

width:220px;

margin:auto;
margin-bottom:40px;

animation:pulse 4s infinite;

}

.logo img{

width:100%;

filter:
drop-shadow(0 0 30px rgba(255,255,255,.15));

}

h1,h2{

font-size:clamp(3rem,9vw,7rem);

font-weight:900;

line-height:.92;

letter-spacing:-2px;

text-shadow:
0 10px 30px rgba(0,0,0,.8);

margin-bottom:24px;

}

.spec{

font-size:1.15rem;

opacity:.85;

margin-bottom:40px;

}

.btn{

display:inline-flex;

padding:18px 34px;

border-radius:12px;

background:white;
color:black;

font-weight:900;

text-decoration:none;

transition:.35s;

}

.btn:hover{

transform:scale(1.04);

}

.whatsapp{

position:fixed;

right:24px;
bottom:24px;

width:70px;
height:70px;

border-radius:50%;

background:#25D366;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;

z-index:999;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}

}

@keyframes fog{

0%{

transform:translateX(-5%) scale(1);

}

100%{

transform:translateX(5%) scale(1.1);

}

}

@keyframes cinematicReveal{

from{

opacity:0;
transform:scale(1.08);

}

to{

opacity:1;
transform:scale(1);

}

}

</style>

</head>
