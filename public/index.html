<!-- ===================================================== -->
<!-- HERO REFINED — VELVER MOTOS BLACK EXPERIENCE™ -->
<!-- Minimal Cinematic Premium Hero -->
<!-- ===================================================== -->

<section class="hero">

    <div class="hero-content reveal">

        <!-- SMALL LABEL -->

        <small>

            BLACK EXPERIENCE™

        </small>

        <!-- MAIN TITLE -->

        <h1>

            Construimos confianza
            sobre ruedas.

        </h1>

        <!-- SUBTEXT -->

        <p>

            Tecnología, transparencia y atención humana
            integradas en una experiencia premium.

        </p>

        <!-- BUTTONS -->

        <div class="hero-buttons">

            <button class="btn-main">

                Explorar showroom

            </button>

            <button class="btn-glass">

                Ver catálogo

            </button>

        </div>

    </div>

    <!-- SCROLL INDICATOR -->

    <div class="scroll-indicator">

        <span></span>

    </div>

</section>

<!-- ===================================================== -->
<!-- CSS -->
<!-- ===================================================== -->

<style>

/* ===================================================== */
/* HERO */
/* ===================================================== */

.hero{

    position:relative;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:140px 40px 100px;

    text-align:center;

}

/* ===================================================== */
/* CONTENT */
/* ===================================================== */

.hero-content{

    position:relative;

    z-index:2;

    max-width:980px;

}

/* ===================================================== */
/* SMALL LABEL */
/* ===================================================== */

.hero-content small{

    display:inline-block;

    color:#1E6DFF;

    letter-spacing:6px;

    font-weight:700;

    margin-bottom:28px;

}

/* ===================================================== */
/* TITLE */
/* ===================================================== */

.hero-content h1{

    font-size:clamp(3.5rem,8vw,7rem);

    line-height:.95;

    font-family:'Orbitron',sans-serif;

    text-transform:uppercase;

    letter-spacing:-2px;

    text-shadow:
    0 0 30px rgba(30,109,255,.12);

}

/* ===================================================== */
/* SUBTEXT */
/* ===================================================== */

.hero-content p{

    margin:38px auto 0;

    max-width:760px;

    font-size:1.1rem;

    line-height:2;

    color:#D7DCE3;

}

/* ===================================================== */
/* BUTTONS */
/* ===================================================== */

.hero-buttons{

    margin-top:48px;

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;

}

/* ===================================================== */
/* PRIMARY BUTTON */
/* ===================================================== */

.btn-main{

    padding:16px 32px;

    border:none;

    border-radius:999px;

    background:
    linear-gradient(135deg,
    #0B46B5,
    #1E6DFF);

    color:white;

    font-weight:600;

    cursor:pointer;

    transition:.35s ease;

    box-shadow:
    0 0 35px rgba(30,109,255,.25);

}

.btn-main:hover{

    transform:translateY(-4px);

    box-shadow:
    0 0 50px rgba(30,109,255,.42);

}

/* ===================================================== */
/* GLASS BUTTON */
/* ===================================================== */

.btn-glass{

    padding:16px 32px;

    border-radius:999px;

    border:1px solid rgba(255,255,255,.08);

    background:rgba(255,255,255,.04);

    color:white;

    backdrop-filter:blur(12px);

    cursor:pointer;

    transition:.35s ease;

}

.btn-glass:hover{

    background:rgba(255,255,255,.08);

    transform:translateY(-4px);

}

/* ===================================================== */
/* SCROLL INDICATOR */
/* ===================================================== */

.scroll-indicator{

    position:absolute;

    bottom:40px;

    left:50%;

    transform:translateX(-50%);

}

.scroll-indicator span{

    display:block;

    width:2px;

    height:70px;

    background:
    linear-gradient(to bottom,
    rgba(255,255,255,.0),
    rgba(255,255,255,.7),
    rgba(255,255,255,.0));

    animation:scrollMove 2s infinite;

}

@keyframes scrollMove{

    0%{

        opacity:.2;
        transform:translateY(0);

    }

    50%{

        opacity:1;
        transform:translateY(10px);

    }

    100%{

        opacity:.2;
        transform:translateY(0);

    }

}

/* ===================================================== */
/* REVEAL */
/* ===================================================== */

.reveal{

    opacity:0;

    transform:translateY(40px);

    animation:heroReveal 1.4s ease forwards;

}

@keyframes heroReveal{

    to{

        opacity:1;
        transform:translateY(0);

    }

}

/* ===================================================== */
/* RESPONSIVE */
/* ===================================================== */

@media(max-width:768px){

    .hero{

        padding-top:180px;

    }

    .hero-content h1{

        letter-spacing:-1px;

    }

    .hero-content p{

        font-size:1rem;

    }

}

</style>
